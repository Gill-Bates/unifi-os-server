# arm64
https://fw-download.ubnt.com/data/unifi-os-server/df5b-linux-arm64-5.0.6-f35e944c-f4b6-4190-93a8-be61b96c58f4.6-arm64

# ============================================
# Multi-Arch Docker Build (amd64 + arm64)
# ============================================

# Builder erstellen (einmalig)
docker buildx create --name multiarch --driver docker-container --bootstrap --use

# Bei Docker Hub einloggen
docker login

# Build und Push
#  --platform linux/amd64,linux/arm64 \

cd /opt/unifi-os-server && \
VERSION="5.0.6" && \
BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" && \
docker buildx build \
  --platform linux/amd64 \
  -f Dockerfile \
  --build-arg APP_VERSION="$VERSION" \
  --build-arg BUILD_DATE="$BUILD_DATE" \
  -t "giiibates/unifi-os-server:${VERSION}" \
  -t "giiibates/unifi-os-server:latest" \
  --push .

# Container aktualisieren
docker compose down && docker compose pull && docker compose up -d

# ============================================
# Cleanup
# ============================================
docker system prune -af
docker buildx prune -af