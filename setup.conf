# UniFi OS Server Build Configuration
# URLs are automatically fetched from ui.com if not set

# Optional: Override URLs (auto-fetched if empty)
# export UNIFI_OS_URL_X64=""
# export UNIFI_OS_URL_ARM64=""

# Build commands:
# Build latest for amd64 only:
#   cd docker && ./build.sh

# Build latest for both architectures:
#   PLATFORMS=linux/amd64,linux/arm64 cd docker && ./build.sh

# Build without pushing:
#   PUSH=false cd docker && ./build.sh

# Clean up Docker resources:
#   docker system prune -af
#   docker buildx prune -af
