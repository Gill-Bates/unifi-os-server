name: Check for UniFi OS Server Updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  DOWNLOAD_PAGE_URL: "https://ui.com/download/software/unifi-os-server"

jobs:
  check-version:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      new_version_available: ${{ steps.check.outputs.new_version_available }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      url_x64: ${{ steps.check.outputs.url_x64 }}
      url_arm64: ${{ steps.check.outputs.url_arm64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Get current version from repository
        id: current
        run: |
          # Extract version from setup.conf
          if [[ -f setup.conf ]]; then
            CURRENT_VERSION=$(grep -oP 'UNIFI_OS_URL_X64.*-(\d+\.\d+\.\d+)-' setup.conf | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "0.0.0")
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Fetch latest version from Ubiquiti
        id: latest
        run: |
          # The download page is JavaScript-rendered, but we can try to find a static API
          # or parse the page content. Ubiquiti publishes releases at a predictable URL pattern.
          
          # Method 1: Try to fetch the page and extract URLs
          # The page uses JavaScript, so we need to be creative
          
          # Method 2: Use the known URL pattern and check if newer versions exist
          # URLs follow pattern: https://fw-download.ubnt.com/data/unifi-os-server/XXXX-linux-x64-VERSION-UUID
          
          # For now, we'll use a simple approach: fetch the page HTML and grep for Linux URLs
          echo "Fetching download page..."
          
          # Use curl with a browser user-agent to get the page
          PAGE_CONTENT=$(curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
            "https://ui.com/download/software/unifi-os-server" 2>/dev/null || echo "")
          
          if [[ -z "$PAGE_CONTENT" ]]; then
            echo "Failed to fetch page, trying alternative method..."
            # Fallback: check if we can access the releases API
            PAGE_CONTENT=$(curl -sL "https://community.ui.com/releases?q=uosserver" 2>/dev/null || echo "")
          fi
          
          # Extract Linux x64 URL and version
          # Pattern: fw-download.ubnt.com/data/unifi-os-server/XXXX-linux-x64-VERSION-UUID
          URL_X64=$(echo "$PAGE_CONTENT" | grep -oP 'https://fw-download\.ubnt\.com/data/unifi-os-server/[a-z0-9]+-linux-x64-[0-9]+\.[0-9]+\.[0-9]+-[a-f0-9-]+\.[0-9]+-x64' | head -1 || echo "")
          URL_ARM64=$(echo "$PAGE_CONTENT" | grep -oP 'https://fw-download\.ubnt\.com/data/unifi-os-server/[a-z0-9]+-linux-arm64-[0-9]+\.[0-9]+\.[0-9]+-[a-f0-9-]+\.[0-9]+-arm64' | head -1 || echo "")
          
          if [[ -n "$URL_X64" ]]; then
            LATEST_VERSION=$(echo "$URL_X64" | grep -oP '\d+\.\d+\.\d+' | head -1)
            echo "Found Linux x64 URL: $URL_X64"
            echo "Found Linux arm64 URL: $URL_ARM64"
            echo "Latest version: $LATEST_VERSION"
          else
            echo "Could not extract URLs from page, using fallback..."
            # Fallback: use the URLs from setup.conf as baseline
            LATEST_VERSION="${{ steps.current.outputs.version }}"
            URL_X64=""
            URL_ARM64=""
          fi
          
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_arm64=$URL_ARM64" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          URL_X64="${{ steps.latest.outputs.url_x64 }}"
          URL_ARM64="${{ steps.latest.outputs.url_arm64 }}"
          FORCE="${{ github.event.inputs.force_build }}"
          
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"
          echo "Force build: $FORCE"
          
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_arm64=$URL_ARM64" >> $GITHUB_OUTPUT
          
          # Compare versions using sort -V
          if [[ "$FORCE" == "true" ]]; then
            echo "Force build requested"
            echo "new_version_available=true" >> $GITHUB_OUTPUT
          elif [[ -z "$LATEST" || "$LATEST" == "0.0.0" ]]; then
            echo "Could not determine latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT" != "$LATEST" ]]; then
            # Check if LATEST is actually newer
            NEWER=$(printf '%s\n%s' "$CURRENT" "$LATEST" | sort -V | tail -1)
            if [[ "$NEWER" == "$LATEST" && "$NEWER" != "$CURRENT" ]]; then
              echo "New version available: $LATEST (current: $CURRENT)"
              echo "new_version_available=true" >> $GITHUB_OUTPUT
            else
              echo "Current version is up to date or newer"
              echo "new_version_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Already at latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "## UniFi OS Server Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Current Version | ${{ steps.check.outputs.current_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Version | ${{ steps.check.outputs.latest_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Available | ${{ steps.check.outputs.new_version_available }} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check.outputs.new_version_available }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Download URLs" >> $GITHUB_STEP_SUMMARY
            echo "- x64: ${{ steps.check.outputs.url_x64 }}" >> $GITHUB_STEP_SUMMARY
            echo "- arm64: ${{ steps.check.outputs.url_arm64 }}" >> $GITHUB_STEP_SUMMARY
          fi

  update-and-build:
    name: Update configuration and trigger build
    needs: check-version
    if: needs.check-version.outputs.new_version_available == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update setup.conf
        run: |
          URL_X64="${{ needs.check-version.outputs.url_x64 }}"
          URL_ARM64="${{ needs.check-version.outputs.url_arm64 }}"
          VERSION="${{ needs.check-version.outputs.latest_version }}"
          
          if [[ -n "$URL_X64" && -n "$URL_ARM64" ]]; then
            cat > setup.conf << EOF
          export UNIFI_OS_URL_X64="$URL_X64"
          export UNIFI_OS_URL_ARM64="$URL_ARM64"

          export UNIFI_DOWNLOAD_URL="https://ui.com/download/software/unifi-os-server"

          # Build and push:
          cd docker && ./build.sh

          # Clean up Docker resources:
          docker system prune -af
          docker buildx prune -af
          EOF
            
            echo "Updated setup.conf with version $VERSION"
            cat setup.conf
          else
            echo "URLs not available, skipping update"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          VERSION="${{ needs.check-version.outputs.latest_version }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add setup.conf
          git commit -m "chore: update to UniFi OS Server v${VERSION}

          Automated update detected new version.
          
          - x64: ${{ needs.check-version.outputs.url_x64 }}
          - arm64: ${{ needs.check-version.outputs.url_arm64 }}"
          
          git push

      - name: Trigger build workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yml',
              ref: 'main',
              inputs: {
                push: 'true'
              }
            });
            console.log('Build workflow triggered');

      - name: Create release notes issue
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-version.outputs.latest_version }}';
            const body = `## UniFi OS Server ${version} Released
            
            A new version of UniFi OS Server has been detected and the build has been triggered.
            
            ### Download URLs
            - **x64**: ${{ needs.check-version.outputs.url_x64 }}
            - **arm64**: ${{ needs.check-version.outputs.url_arm64 }}
            
            ### Release Notes
            Check the official release notes: https://community.ui.com/releases/r/uosserver/${version}
            
            ### Docker Image
            Once the build completes, the new image will be available at:
            \`\`\`
            docker pull giiibates/unifi-os-server:${version}
            \`\`\`
            
            ---
            *This issue was automatically created by the update checker workflow.*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 UniFi OS Server ${version} - Automated Build Triggered`,
              body: body,
              labels: ['release', 'automated']
            });
