name: Check for UniFi OS Server Updates

on:
  schedule:
    # Run daily at 06:07 UTC
    - cron: '7 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Ubiquiti Download API - no browser needed!
  DOWNLOAD_API_URL: "https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server"

permissions:
  contents: read

# Prevent multiple concurrent runs - only one update check at a time
concurrency:
  group: unifi-os-update-check
  cancel-in-progress: false

jobs:
  check-version:
    name: Check for new version
    runs-on: ubuntu-24.04
    outputs:
      new_version_available: ${{ steps.check.outputs.new_version_available }}
      api_available: ${{ steps.check.outputs.api_available }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      url_x64: ${{ steps.check.outputs.url_x64 }}
      url_arm64: ${{ steps.check.outputs.url_arm64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get current version from git tags
        id: current
        run: |
          # Get latest version tag (vX.Y.Z format)
          CURRENT_VERSION=$(git tag -l 'v*' | sort -V | tail -1 | sed 's/^v//' || echo "0.0.0")
          if [[ -z "$CURRENT_VERSION" ]]; then
            CURRENT_VERSION="0.0.0"
          fi
          echo "Current version from tags: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Fetch latest version from Ubiquiti API
        id: latest
        shell: bash
        run: |
          set -Eeuo pipefail

          write_output() {
            local key="$1"
            local value="$2"

            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "::error::Invalid multiline output for $key"
              exit 1
            fi

            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_OUTPUT"
          }

          echo "Fetching from $DOWNLOAD_API_URL"

          if ! RESPONSE=$(curl --fail --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-all-errors \
            "$DOWNLOAD_API_URL"); then
            echo "::warning::Ubiquiti API request failed (timeout/network/server). Skipping this run."
            write_output api_available "false"
            write_output version ""
            write_output url_x64 ""
            write_output url_arm64 ""
            exit 0
          fi

          if ! jq -e '.downloads | type == "array"' >/dev/null <<< "$RESPONSE"; then
            echo "::warning::Unexpected Ubiquiti API response format. Skipping this run."
            write_output api_available "false"
            write_output version ""
            write_output url_x64 ""
            write_output url_arm64 ""
            exit 0
          fi

          LATEST_ROW=$(
            jq -r '
              .downloads
              | map(select(.name | test("Linux.*(x64|arm64)"; "i")))
              | sort_by(.version)
              | group_by(.version)
              | map({
                  version: .[0].version,
                  x64: (map(select(.name | test("Linux.*x64"; "i")))[0].file_url // ""),
                  arm64: (map(select(.name | test("Linux.*arm64"; "i")))[0].file_url // "")
                })
              | map(select(.x64 != "" and .arm64 != ""))
              | .[]
              | [.version, .x64, .arm64]
              | @tsv
            ' <<< "$RESPONSE" | sort -t $'\t' -k1,1V | tail -1
          )

          if [[ -z "$LATEST_ROW" ]]; then
            echo "::warning::No complete x64/arm64 Linux release found. Skipping this run."
            write_output api_available "false"
            write_output version ""
            write_output url_x64 ""
            write_output url_arm64 ""
            exit 0
          fi

          IFS=$'\t' read -r VERSION URL_X64 URL_ARM64 <<< "$LATEST_ROW"

          [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){2,3}$ ]] || {
            echo "::error::Invalid version: $VERSION"
            exit 1
          }

          [[ "$URL_X64" =~ ^https://[^[:space:]]+$ ]] || {
            echo "::error::Invalid x64 URL"
            exit 1
          }

          [[ "$URL_ARM64" =~ ^https://[^[:space:]]+$ ]] || {
            echo "::error::Invalid arm64 URL"
            exit 1
          }

          echo "Found version: $VERSION"
          echo "Found x64 URL: $URL_X64"
          echo "Found arm64 URL: $URL_ARM64"

          write_output api_available "true"
          write_output version "$VERSION"
          write_output url_x64 "$URL_X64"
          write_output url_arm64 "$URL_ARM64"

      - name: Compare versions
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          API_AVAILABLE="${{ steps.latest.outputs.api_available }}"
          LATEST="${{ steps.latest.outputs.version }}"
          URL_X64="${{ steps.latest.outputs.url_x64 }}"
          URL_ARM64="${{ steps.latest.outputs.url_arm64 }}"
          FORCE="${{ github.event.inputs.force_build || 'false' }}"
          
          echo "API metadata available: $API_AVAILABLE"
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"
          echo "Force build: $FORCE"
          
          echo "api_available=$API_AVAILABLE" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_arm64=$URL_ARM64" >> $GITHUB_OUTPUT

          if [[ "$FORCE" == "true" ]]; then
            echo "Force build requested"
            echo "new_version_available=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$API_AVAILABLE" != "true" ]]; then
            echo "::warning::Skipping version comparison because Ubiquiti API metadata is unavailable"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ -z "$LATEST" || -z "$URL_X64" || -z "$URL_ARM64" ]]; then
            echo "::warning::Could not determine complete latest release metadata"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$CURRENT" != "$LATEST" ]]; then
            NEWER=$(printf '%s\n%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)
            if [[ "$NEWER" == "$LATEST" && "$NEWER" != "$CURRENT" ]]; then
              echo "New version available: $LATEST (current: $CURRENT)"
              echo "new_version_available=true" >> $GITHUB_OUTPUT
            else
              echo "Current version is up to date or newer"
              echo "new_version_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Already at latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "## UniFi OS Server Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Metadata Available | ${{ steps.check.outputs.api_available }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Current Version | ${{ steps.check.outputs.current_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Version | ${{ steps.check.outputs.latest_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Available | ${{ steps.check.outputs.new_version_available }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.check.outputs.api_available }}" != "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "API request to Ubiquiti timed out or failed. This run was skipped safely." >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.check.outputs.new_version_available }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Download URLs" >> $GITHUB_STEP_SUMMARY
            echo "- x64: \`${{ steps.check.outputs.url_x64 }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- arm64: \`${{ steps.check.outputs.url_arm64 }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  trigger-build:
    name: Trigger build for new version
    needs: check-version
    if: needs.check-version.outputs.new_version_available == 'true'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger build workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const refName = context.ref.replace('refs/heads/', '');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yml',
              ref: refName,
              inputs: {
                push: 'true',
                platforms: 'linux/amd64,linux/arm64',
                version: '${{ needs.check-version.outputs.latest_version }}',
                url_x64: '${{ needs.check-version.outputs.url_x64 }}',
                url_arm64: '${{ needs.check-version.outputs.url_arm64 }}',
                enforce_trivy_gate: 'false'  // Keep current non-blocking default for upstream CVEs
              }
            });
            console.log('Triggered build workflow for amd64 + arm64');
            console.log('Release will be created after successful build.');
