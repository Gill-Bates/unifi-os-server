name: Check for UniFi OS Server Updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Ubiquiti Download API - no browser needed!
  DOWNLOAD_API_URL: "https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server"

jobs:
  check-version:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      new_version_available: ${{ steps.check.outputs.new_version_available }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      url_x64: ${{ steps.check.outputs.url_x64 }}
      url_arm64: ${{ steps.check.outputs.url_arm64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get current version from repository
        id: current
        run: |
          if [[ -f setup.conf ]]; then
            CURRENT_VERSION=$(grep -oP 'UNIFI_OS_URL_X64.*-(\d+\.\d+\.\d+)-' setup.conf | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "0.0.0")
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Fetch latest version from Ubiquiti API
        id: latest
        run: |
          echo "Fetching from $DOWNLOAD_API_URL"
          
          # Fetch the API response
          RESPONSE=$(curl -sL "$DOWNLOAD_API_URL")
          
          if [[ -z "$RESPONSE" ]]; then
            echo "Failed to fetch from API"
            echo "version=" >> $GITHUB_OUTPUT
            echo "url_x64=" >> $GITHUB_OUTPUT
            echo "url_arm64=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract latest Linux x64 URL
          URL_X64=$(echo "$RESPONSE" | jq -r '[.downloads[] | select(.name | test("Linux.*x64"; "i"))] | sort_by(.version) | reverse | .[0].file_url // empty')
          
          # Extract latest Linux arm64 URL
          URL_ARM64=$(echo "$RESPONSE" | jq -r '[.downloads[] | select(.name | test("Linux.*arm64"; "i"))] | sort_by(.version) | reverse | .[0].file_url // empty')
          
          # Extract version from x64 URL
          if [[ -n "$URL_X64" ]]; then
            VERSION=$(echo "$URL_X64" | grep -oP '\d+\.\d+\.\d+' | head -1)
          else
            VERSION=""
          fi
          
          echo "Found version: $VERSION"
          echo "Found x64 URL: $URL_X64"
          echo "Found arm64 URL: $URL_ARM64"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_arm64=$URL_ARM64" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          URL_X64="${{ steps.latest.outputs.url_x64 }}"
          URL_ARM64="${{ steps.latest.outputs.url_arm64 }}"
          FORCE="${{ github.event.inputs.force_build }}"
          
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"
          echo "Force build: $FORCE"
          
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_arm64=$URL_ARM64" >> $GITHUB_OUTPUT
          
          if [[ "$FORCE" == "true" ]]; then
            echo "Force build requested"
            echo "new_version_available=true" >> $GITHUB_OUTPUT
          elif [[ -z "$LATEST" ]]; then
            echo "Could not determine latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT" != "$LATEST" ]]; then
            NEWER=$(printf '%s\n%s' "$CURRENT" "$LATEST" | sort -V | tail -1)
            if [[ "$NEWER" == "$LATEST" && "$NEWER" != "$CURRENT" ]]; then
              echo "New version available: $LATEST (current: $CURRENT)"
              echo "new_version_available=true" >> $GITHUB_OUTPUT
            else
              echo "Current version is up to date or newer"
              echo "new_version_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Already at latest version"
            echo "new_version_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "## UniFi OS Server Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Current Version | ${{ steps.check.outputs.current_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Version | ${{ steps.check.outputs.latest_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Available | ${{ steps.check.outputs.new_version_available }} |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check.outputs.new_version_available }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Download URLs" >> $GITHUB_STEP_SUMMARY
            echo "- x64: \`${{ steps.check.outputs.url_x64 }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- arm64: \`${{ steps.check.outputs.url_arm64 }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  update-and-build:
    name: Update configuration and trigger build
    needs: check-version
    if: needs.check-version.outputs.new_version_available == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update setup.conf
        run: |
          URL_X64="${{ needs.check-version.outputs.url_x64 }}"
          URL_ARM64="${{ needs.check-version.outputs.url_arm64 }}"
          VERSION="${{ needs.check-version.outputs.latest_version }}"
          
          if [[ -n "$URL_X64" ]]; then
            cat > setup.conf << EOF
# UniFi OS Server Build Configuration
# Auto-generated by check-updates workflow on $(date -u +%Y-%m-%dT%H:%M:%SZ)
# Version: $VERSION
# Source: https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server

export UNIFI_OS_URL_X64="$URL_X64"
export UNIFI_OS_URL_ARM64="$URL_ARM64"
EOF
            
            echo "Updated setup.conf with version $VERSION"
            cat setup.conf
          else
            echo "URLs not available, skipping update"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          VERSION="${{ needs.check-version.outputs.latest_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add setup.conf
          git commit -m "Update to UniFi OS Server $VERSION" || exit 0
          git push

      - name: Trigger build workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yml',
              ref: 'main',
              inputs: {
                push: 'true',
                platforms: 'linux/amd64,linux/arm64'
              }
            });
            console.log('Triggered build workflow');

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-version.outputs.latest_version }}';
            const url_x64 = '${{ needs.check-version.outputs.url_x64 }}';
            const url_arm64 = '${{ needs.check-version.outputs.url_arm64 }}';
            
            const body = `## UniFi OS Server ${version}

**Docker Image:** \`docker pull giiibates/unifi-os-server:${version}\`

### Download URLs
- [Linux x64](${url_x64})
- [Linux arm64](${url_arm64})

**Source:** [Ubiquiti Downloads](https://ui.com/download/software/unifi-os-server)
`;
            
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v${version}`,
                name: `UniFi OS Server ${version}`,
                body: body,
                draft: false,
                prerelease: false
              });
              console.log(`Created release v${version}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Release v${version} already exists`);
              } else {
                throw e;
              }
            }
