name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: docker.io
  IMAGE_NAME: giiibates/unifi-os-server

jobs:
  build-arch:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build preinstalled runtime image
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
          PUSH: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') && 'true' || 'false' }}
          PLATFORMS: ${{ matrix.platform }}
        run: bash ./build.sh

  publish-manifest:
    name: Publish multi-arch manifest
    needs: build-arch
    if: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive version from setup.conf
        id: version
        shell: bash
        run: |
          first_url="$(grep -E '^https://fw-download\.ubnt\.com/data/unifi-os-server/' setup.conf | sed -n '1p')"
          version="$(sed -E 's|.*-([0-9]+\.[0-9]+\.[0-9]+)-.*|\1|' <<<"$first_url")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish multi-arch manifests
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_NAME}:${VERSION}-arm64"
