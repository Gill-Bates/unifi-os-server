name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: docker.io
  IMAGE_NAME: giiibates/unifi-os-server

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Load URLs from setup.conf (fallback)
        id: urls
        run: |
          # Load from setup.conf if repository variables are not set
          if [[ -f setup.conf ]]; then
            source setup.conf
            echo "url_x64=${UNIFI_OS_URL_X64}" >> $GITHUB_OUTPUT
            echo "url_arm64=${UNIFI_OS_URL_ARM64}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from setup.conf
        id: version
        run: |
          if [[ -f setup.conf ]]; then
            VERSION=$(grep -oP '\d+\.\d+\.\d+' setup.conf | head -1 || echo "latest")
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Build preinstalled runtime image
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
          PUSH: 'false'
          PLATFORMS: linux/amd64
          UNIFI_OS_URL_X64: ${{ vars.UNIFI_OS_URL_X64 || steps.urls.outputs.url_x64 }}
          UNIFI_OS_URL_ARM64: ${{ vars.UNIFI_OS_URL_ARM64 || steps.urls.outputs.url_arm64 }}
        run: bash ./docker/build.sh

      - name: Trivy vulnerability scan (amd64)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-amd64'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
          trivyignores: '.trivyignore'

      - name: Push image (if enabled)
        if: github.event_name != 'pull_request' && github.event.inputs.push != 'false'
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PLATFORMS: linux/amd64
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker push "${IMAGE_NAME}:${VERSION}-amd64"
          docker tag "${IMAGE_NAME}:${VERSION}-amd64" "${IMAGE_NAME}:${VERSION}"
          docker tag "${IMAGE_NAME}:${VERSION}-amd64" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${VERSION}"
          docker push "${IMAGE_NAME}:latest"
