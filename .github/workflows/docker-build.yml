name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      platforms:
        description: 'Platforms to build (multi-arch only)'
        required: false
        default: 'linux/amd64,linux/arm64'  # Native runners available for both
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
      version:
        description: 'Pinned UniFi OS version (optional)'
        required: false
        default: ''
        type: string
      url_x64:
        description: 'Pinned Linux x64 installer URL (optional)'
        required: false
        default: ''
        type: string
      url_arm64:
        description: 'Pinned Linux arm64 installer URL (optional)'
        required: false
        default: ''
        type: string
      enforce_trivy_gate:
        description: 'Fail build on HIGH/CRITICAL Trivy findings'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      promote_latest:
        description: 'Update Docker latest tag and mark release latest'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'true'
          - 'false'
env:
  REGISTRY: docker.io
  IMAGE_NAME: giiibates/unifi-os-server

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

# Prevent duplicate builds - queue new runs, don't cancel in-progress builds
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-24.04
    if: github.event.inputs.platforms == 'linux/amd64,linux/arm64' || github.event.inputs.platforms == ''
    outputs:
      version: ${{ steps.build.outputs.version }}
      trivy_summary: ${{ steps.trivy_summary.outputs.summary }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64 image (auto-fetch URLs)
        id: build
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PUSH: 'false'
          PLATFORMS: linux/amd64
          VERSION: ${{ github.event.inputs.version }}
          UNIFI_OS_URL_X64: ${{ github.event.inputs.url_x64 }}
          UNIFI_OS_URL_ARM64: ${{ github.event.inputs.url_arm64 }}
          # INPUT_VERSION is passed via env (not inline ${{ }}) to prevent
          # shell injection: ${{ }} is expanded before shell execution.
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          BUILD_DATE="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%cI)"
          export BUILD_DATE
          echo "Using reproducible BUILD_DATE=${BUILD_DATE}"

          bash ./docker/build.sh

          VERSION="$(
            docker images --format '{{.Tag}}' "$IMAGE_NAME" \
              | sed -nE 's/^([0-9]+(\.[0-9]+){2,3})(-(amd64|arm64))?$/\1/p' \
              | sort -V \
              | tail -1
          )"

          if [[ -z "${VERSION:-}" ]]; then
            echo "Failed to resolve built image version from local tags" >&2
            docker images "$IMAGE_NAME" >&2 || true
            exit 1
          fi

          # EXPECTED_VERSION comes from the workflow input via env: to avoid
          # direct ${{ }} interpolation into the shell script (injection risk).
          EXPECTED_VERSION="${INPUT_VERSION}"
          if [[ -n "$EXPECTED_VERSION" && "$VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Resolved image version ($VERSION) does not match requested version ($EXPECTED_VERSION)" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Built version: ${VERSION}"

      - name: Upload failure artifacts (amd64)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failure-artifacts-amd64
          path: /tmp/uos-build-*/failure-*
          retention-days: 7
          if-no-files-found: ignore

      - name: Trivy vulnerability scan (amd64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.build.outputs.version }}-amd64'
          format: 'json'
          output: 'trivy-amd64.json'
          exit-code: ${{ github.event.inputs.enforce_trivy_gate == 'true' && '1' || '0' }}
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
          trivyignores: '.trivyignore'

      - name: Generate Trivy summary (amd64)
        id: trivy_summary
        run: |
          if [[ ! -f trivy-amd64.json ]]; then
            echo "summary=Scan failed - no results" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-amd64.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-amd64.json 2>/dev/null || echo 0)

          if (( CRITICAL == 0 && HIGH == 0 )); then
            SUMMARY="✅ No HIGH/CRITICAL vulnerabilities found"
          else
            SUMMARY="⚠️ ${CRITICAL} CRITICAL, ${HIGH} HIGH vulnerabilities"
          fi

          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY"

          # Also output table to logs for visibility
          echo "### Trivy Scan Results (amd64)" >> "$GITHUB_STEP_SUMMARY"
          if (( CRITICAL > 0 || HIGH > 0 )); then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity)\t\(.VulnerabilityID)\t\(.PkgName)\t\(.InstalledVersion)"' trivy-amd64.json 2>/dev/null | head -20 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy findings (amd64)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-findings-amd64
          path: trivy-amd64.json
          retention-days: 14
          if-no-files-found: warn

      - name: Smoke test amd64 image
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          IMAGE="${IMAGE_NAME}:${VERSION}-amd64"
          echo "Running filesystem smoke test for $IMAGE..."

          # Run as one-shot with entrypoint override — pure filesystem validation.
          # Critical checks use explicit exit 1 so this step actually fails when
          # the image is broken (instead of printing MISSING and exiting 0).
          docker run --rm --entrypoint /bin/sh "$IMAGE" -c '
            set -e

            echo "=== Basic structure ==="
            if ! test -x /sbin/init; then
              echo "/sbin/init: MISSING or not executable" >&2
              exit 1
            fi
            echo "/sbin/init: OK"

            echo "=== Systemd service units ==="
            UNIT_COUNT=$(find /lib/systemd/system /etc/systemd/system -name "*.service" 2>/dev/null \
              | grep -ic unifi || true)
            if [ "$UNIT_COUNT" -eq 0 ]; then
              echo "No unifi*.service units found" >&2
              exit 1
            fi
            echo "Found $UNIT_COUNT unifi service unit(s): OK"

            echo "=== Java ==="
            which java 2>/dev/null \
              || find /usr -name "java" -type f 2>/dev/null | head -1 \
              || echo "Java not found (informational)"

            echo "=== UniFi directories ==="
            ls -d /usr/share/*unifi* 2>/dev/null || echo "No /usr/share/*unifi*"
            ls -d /opt/*unifi* 2>/dev/null || echo "No /opt/*unifi*"
            ls -d /var/lib/*unifi* 2>/dev/null || echo "No /var/lib/*unifi*"

            echo "=== JAR files (first 5) ==="
            find /usr /opt /var/lib -name "*.jar" -type f 2>/dev/null | head -5 \
              || echo "No JAR files"

            echo "Smoke test passed!"
          '

      - name: Push amd64 image
        if: github.event.inputs.push != 'false'
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          docker push "${IMAGE_NAME}:${VERSION}-amd64"

  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-24.04-arm  # Native arm64 runner - no QEMU emulation needed
    if: github.event.inputs.platforms == 'linux/amd64,linux/arm64' || github.event.inputs.platforms == ''
    outputs:
      version: ${{ steps.build.outputs.version }}
      trivy_summary: ${{ steps.trivy_summary.outputs.summary }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # No QEMU needed - running natively on arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build arm64 image (auto-fetch URLs)
        id: build
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PUSH: 'false'
          PLATFORMS: linux/arm64
          VERSION: ${{ github.event.inputs.version }}
          UNIFI_OS_URL_X64: ${{ github.event.inputs.url_x64 }}
          UNIFI_OS_URL_ARM64: ${{ github.event.inputs.url_arm64 }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Reproducible BUILD_DATE: bind to the commit, not wall-clock time.
          # Identical source + installer -> identical image digest, so a rebuild
          # of the same version overwrites the same digest instead of creating
          # a new untagged orphan in the registry.
          BUILD_DATE="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%cI)"
          export BUILD_DATE
          echo "Using reproducible BUILD_DATE=${BUILD_DATE}"

          bash ./docker/build.sh

          VERSION="$(
            docker images --format '{{.Tag}}' "$IMAGE_NAME" \
              | sed -nE 's/^([0-9]+(\.[0-9]+){2,3})(-(amd64|arm64))?$/\1/p' \
              | sort -V \
              | tail -1
          )"

          if [[ -z "${VERSION:-}" ]]; then
            echo "Failed to resolve built image version from local tags" >&2
            docker images "$IMAGE_NAME" >&2 || true
            exit 1
          fi

          EXPECTED_VERSION="${INPUT_VERSION}"
          if [[ -n "$EXPECTED_VERSION" && "$VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Resolved image version ($VERSION) does not match requested version ($EXPECTED_VERSION)" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Built version: ${VERSION}"

      - name: Upload failure artifacts (arm64)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failure-artifacts-arm64
          path: /tmp/uos-build-*/failure-*
          retention-days: 7
          if-no-files-found: ignore

      - name: Trivy vulnerability scan (arm64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.build.outputs.version }}-arm64'
          format: 'json'
          output: 'trivy-arm64.json'
          exit-code: ${{ github.event.inputs.enforce_trivy_gate == 'true' && '1' || '0' }}
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
          trivyignores: '.trivyignore'

      - name: Generate Trivy summary (arm64)
        id: trivy_summary
        run: |
          if [[ ! -f trivy-arm64.json ]]; then
            echo "summary=Scan failed - no results" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-arm64.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-arm64.json 2>/dev/null || echo 0)

          if (( CRITICAL == 0 && HIGH == 0 )); then
            SUMMARY="✅ No HIGH/CRITICAL vulnerabilities found"
          else
            SUMMARY="⚠️ ${CRITICAL} CRITICAL, ${HIGH} HIGH vulnerabilities"
          fi

          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY"

          # Also output table to logs for visibility
          echo "### Trivy Scan Results (arm64)" >> "$GITHUB_STEP_SUMMARY"
          if (( CRITICAL > 0 || HIGH > 0 )); then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity)\t\(.VulnerabilityID)\t\(.PkgName)\t\(.InstalledVersion)"' trivy-arm64.json 2>/dev/null | head -20 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy findings (arm64)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-findings-arm64
          path: trivy-arm64.json
          retention-days: 14
          if-no-files-found: warn

      - name: Smoke test arm64 image
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          IMAGE="${IMAGE_NAME}:${VERSION}-arm64"
          echo "Running filesystem smoke test for $IMAGE..."

          docker run --rm --entrypoint /bin/sh "$IMAGE" -c '
            set -e

            echo "=== Basic structure ==="
            if ! test -x /sbin/init; then
              echo "/sbin/init: MISSING or not executable" >&2
              exit 1
            fi
            echo "/sbin/init: OK"

            echo "=== Systemd service units ==="
            UNIT_COUNT=$(find /lib/systemd/system /etc/systemd/system -name "*.service" 2>/dev/null \
              | grep -ic unifi || true)
            if [ "$UNIT_COUNT" -eq 0 ]; then
              echo "No unifi*.service units found" >&2
              exit 1
            fi
            echo "Found $UNIT_COUNT unifi service unit(s): OK"

            echo "=== Java ==="
            which java 2>/dev/null \
              || find /usr -name "java" -type f 2>/dev/null | head -1 \
              || echo "Java not found (informational)"

            echo "=== UniFi directories ==="
            ls -d /usr/share/*unifi* 2>/dev/null || echo "No /usr/share/*unifi*"
            ls -d /opt/*unifi* 2>/dev/null || echo "No /opt/*unifi*"
            ls -d /var/lib/*unifi* 2>/dev/null || echo "No /var/lib/*unifi*"

            echo "=== JAR files (first 5) ==="
            find /usr /opt /var/lib -name "*.jar" -type f 2>/dev/null | head -5 \
              || echo "No JAR files"

            echo "Smoke test passed!"
          '
          echo "Built version: ${VERSION}"

      - name: Push arm64 image
        if: github.event.inputs.push != 'false'
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          docker push "${IMAGE_NAME}:${VERSION}-arm64"

  create-manifest:
    name: Create multi-arch manifest
    needs: [build-amd64, build-arm64]
    if: always() && needs.build-amd64.result == 'success' && needs.build-arm64.result == 'success' && github.event.inputs.push != 'false'
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      promote_latest: ${{ steps.manifest.outputs.promote_latest }}
    permissions:
      contents: read

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Acquire Docker Hub API token
        id: hubtoken
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          LOGIN_PAYLOAD="$(
            jq -nc \
              --arg username "$DOCKERHUB_USERNAME" \
              --arg password "$DOCKERHUB_PASSWORD" \
              '{username: $username, password: $password}'
          )"

          LOGIN_RESPONSE=$(curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "${LOGIN_PAYLOAD}" \
            https://hub.docker.com/v2/users/login/)
          TOKEN=$(echo "${LOGIN_RESPONSE}" | jq -r '.token // empty')
          if [[ -z "${TOKEN}" ]]; then
            echo "Failed to obtain Docker Hub API token" >&2
            exit 1
          fi
          # Mask so the token never appears in logs, then expose to later steps.
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        id: manifest
        env:
          # Pass dispatch inputs via env to avoid direct ${{ }} interpolation
          # in the shell script — same pattern as the build steps.
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PROMOTE_LATEST: ${{ github.event.inputs.promote_latest }}
        run: |
          AMD_VERSION="${{ needs.build-amd64.outputs.version }}"
          ARM_VERSION="${{ needs.build-arm64.outputs.version }}"
          VERSION="$AMD_VERSION"
          REQUESTED_VERSION="${INPUT_VERSION}"
          PROMOTE_LATEST_INPUT="${INPUT_PROMOTE_LATEST}"
          REGISTRY_TOKEN="$(
            curl -fsSL \
              "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${IMAGE_NAME}:pull" \
              | jq -r '.token // empty'
          )"
          ACCEPT_HEADER='application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json'

          if [[ -z "${REGISTRY_TOKEN}" ]]; then
            echo "Failed to obtain Docker registry pull token" >&2
            exit 1
          fi

          version_ge() {
            local candidate="$1"
            local baseline="$2"

            [[ "$(printf '%s\n%s\n' "$baseline" "$candidate" | sort -V | tail -n 1)" == "$candidate" ]]
          }

          fetch_manifest() {
            local ref="$1"

            curl -fsSL \
              -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
              -H "Accept: ${ACCEPT_HEADER}" \
              "https://registry-1.docker.io/v2/${IMAGE_NAME}/manifests/${ref}"
          }

          fetch_current_latest_version() {
            local manifest child_digest child_manifest config_digest config version

            if ! manifest="$(fetch_manifest "latest" 2>/dev/null)"; then
              return 2
            fi

            child_digest="$(jq -r '.manifests[]? | select(.platform.architecture == "amd64") | .digest' <<< "$manifest" | head -n 1)"
            if [[ -z "$child_digest" ]]; then
              child_digest="$(jq -r '.manifests[0]?.digest // empty' <<< "$manifest")"
            fi

            if [[ -n "$child_digest" ]]; then
              child_manifest="$(fetch_manifest "$child_digest")"
            else
              child_manifest="$manifest"
            fi

            config_digest="$(jq -r '.config.digest // empty' <<< "$child_manifest")"
            [[ -n "$config_digest" ]] || return 1

            config="$(
              curl -fsSL \
                -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
                "https://registry-1.docker.io/v2/${IMAGE_NAME}/blobs/${config_digest}"
            )"

            version="$(jq -r '.config.Labels["org.opencontainers.image.version"] // empty' <<< "$config")"
            [[ -n "$version" ]] || return 1
            printf '%s\n' "$version"
          }

          if [[ -z "$AMD_VERSION" ]]; then
            echo "Missing amd64 version output"
            exit 1
          fi

          if [[ "${{ needs.build-arm64.result }}" == "success" && "$ARM_VERSION" != "$AMD_VERSION" ]]; then
            echo "Version mismatch between architectures: amd64=$AMD_VERSION arm64=$ARM_VERSION"
            exit 1
          fi
          
          # Verify both arch images are available — the needs-guard guarantees
          # both build jobs succeeded, but a Hub-side race or a concurrent delete
          # could still leave one tag missing. Publishing a "multi-arch" manifest
          # with a single platform would silently misrepresent the release.
          IMAGES=()
          if docker manifest inspect "${IMAGE_NAME}:${VERSION}-amd64" > /dev/null 2>&1; then
            IMAGES+=("${IMAGE_NAME}:${VERSION}-amd64")
          fi
          if docker manifest inspect "${IMAGE_NAME}:${VERSION}-arm64" > /dev/null 2>&1; then
            IMAGES+=("${IMAGE_NAME}:${VERSION}-arm64")
          fi

          if (( ${#IMAGES[@]} != 2 )); then
            echo "Expected 2 arch images on Hub, found ${#IMAGES[@]}: ${IMAGES[*]:-none}" >&2
            echo "This may indicate a Hub inconsistency or a concurrent tag deletion." >&2
            exit 1
          fi

          case "${PROMOTE_LATEST_INPUT:-auto}" in
            true)
              PROMOTE_LATEST=true
              ;;
            false)
              PROMOTE_LATEST=false
              ;;
            auto|"")
              if [[ -z "$REQUESTED_VERSION" ]]; then
                PROMOTE_LATEST=true
              else
                PROMOTE_LATEST=false
              fi
              ;;
            *)
              echo "Invalid promote_latest input: ${PROMOTE_LATEST_INPUT}" >&2
              exit 1
              ;;
          esac

          if [[ "$PROMOTE_LATEST" == "true" ]]; then
            if CURRENT_LATEST_VERSION="$(fetch_current_latest_version)"; then
              echo "Current latest version: ${CURRENT_LATEST_VERSION}"
              if ! version_ge "$VERSION" "$CURRENT_LATEST_VERSION"; then
                echo "Refusing to move latest backward: built ${VERSION}, current latest ${CURRENT_LATEST_VERSION}" >&2
                PROMOTE_LATEST=false
              fi
            else
              LATEST_STATUS=$?
              if [[ "$LATEST_STATUS" == "2" ]]; then
                echo "No current latest manifest found; promotion is allowed."
              else
                echo "Current latest version could not be resolved; refusing latest promotion." >&2
                exit 1
              fi
            fi
          fi
          
          echo "Creating manifest with: ${IMAGES[*]}"
          echo "Promote latest: ${PROMOTE_LATEST}"

          # Keep the currently published stable tags in place until the new
          # manifest has been pushed successfully. Replacing a tag is safe;
          # deleting it first creates avoidable downtime if the push fails.
          docker manifest rm "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1 || true
          if [[ "$PROMOTE_LATEST" == "true" ]]; then
            docker manifest rm "${IMAGE_NAME}:latest" >/dev/null 2>&1 || true
          fi

          # Create version manifest
          docker manifest create "${IMAGE_NAME}:${VERSION}" "${IMAGES[@]}" --amend
          docker manifest push "${IMAGE_NAME}:${VERSION}" || { echo "Versioned manifest push failed" >&2; exit 1; }
          
          if [[ "$PROMOTE_LATEST" == "true" ]]; then
            docker manifest create "${IMAGE_NAME}:latest" "${IMAGES[@]}" --amend
            docker manifest push "${IMAGE_NAME}:latest" || { echo "latest manifest push failed" >&2; exit 1; }
          else
            echo "Skipped latest manifest promotion"
          fi
          
          echo "Pushed manifests:"
          echo "  ${IMAGE_NAME}:${VERSION}"
          if [[ "$PROMOTE_LATEST" == "true" ]]; then
            echo "  ${IMAGE_NAME}:latest"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "promote_latest=${PROMOTE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Delete arch-specific tags from Docker Hub
        # Only run when the manifest step succeeded — running on failure would
        # delete the arch-specific tags even though no multi-arch manifest was
        # published, leaving the version effectively unreachable on Hub.
        if: steps.manifest.conclusion == 'success' && steps.hubtoken.outputs.token != ''
        env:
          HUB_TOKEN: ${{ steps.hubtoken.outputs.token }}
        run: |
          VERSION="${{ needs.build-amd64.outputs.version }}"

          for ARCH in amd64 arm64; do
            TAG="${VERSION}-${ARCH}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${HUB_TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${TAG}/")
            if [[ "${STATUS}" == "200" || "${STATUS}" == "204" ]]; then
              echo "Deleted arch-specific tag: ${TAG}"
            elif [[ "${STATUS}" == "404" ]]; then
              echo "Arch tag not found (skipping): ${TAG}"
            else
              echo "Unexpected HTTP ${STATUS} when deleting arch tag: ${TAG}" >&2
              exit 1
            fi
          done

      - name: Prune stale untagged Docker Hub image objects
        # continue-on-error: the manifest and arch images are already live at
        # this point. A prune failure (rate limit, Hub API hiccup) must not
        # block the downstream create-release job — the next build run will
        # clean up whatever this run missed.
        if: steps.manifest.conclusion == 'success' && steps.hubtoken.outputs.token != ''
        continue-on-error: true
        env:
          HUB_TOKEN: ${{ steps.hubtoken.outputs.token }}
        run: |
          set -euo pipefail

          VERSION="${{ needs.build-amd64.outputs.version }}"
          #
          # Multi-arch tags are an OCI/Docker image index plus child platform
          # manifests. After deleting the intermediate -amd64/-arm64 tags, the
          # child manifests often show up as inactive, but the published VERSION
          # and latest index still reference them. Protect the currently
          # published index digest(s) and child manifest digest(s) first, then
          # delete only older inactive image objects.

          NAMESPACE="${IMAGE_NAME%%/*}"
          REPO="${IMAGE_NAME#*/}"
          IMAGES_BASE="https://hub.docker.com/v2/namespaces/${NAMESPACE}/repositories/${REPO}/images"
          REGISTRY_TOKEN="$(
            curl -fsSL \
              "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${IMAGE_NAME}:pull" \
              | jq -r '.token // empty'
          )"

          if [[ -z "${REGISTRY_TOKEN}" ]]; then
            echo "Failed to obtain Docker registry pull token" >&2
            exit 1
          fi

          ACCEPT_HEADER='application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json'

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          protected="${tmpdir}/protected-digests.txt"
          : > "${protected}"

          collect_protected_digests() {
            local tag="$1"
            local optional="${2:-false}"
            local manifest_file="${tmpdir}/manifest-${tag}.json"
            local headers

            if ! headers="$(
              curl -fsSIL \
                  -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
                  -H "Accept: ${ACCEPT_HEADER}" \
                  "https://registry-1.docker.io/v2/${IMAGE_NAME}/manifests/${tag}"
            )"; then
              if [[ "$optional" == "true" ]]; then
                echo "No published manifest found for ${tag}; skipping digest protection."
                return 0
              fi
              echo "Published manifest ${tag} is missing; cannot protect digests before pruning." >&2
              exit 1
            fi

            echo "${headers}" \
              | awk 'BEGIN{IGNORECASE=1} /^docker-content-digest:/ {gsub(/\r/, ""); print $2}' \
              >> "${protected}"

            curl -fsSL \
              -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
              -H "Accept: ${ACCEPT_HEADER}" \
              "https://registry-1.docker.io/v2/${IMAGE_NAME}/manifests/${tag}" \
              -o "${manifest_file}"

            jq -r '.manifests[]?.digest // empty' "${manifest_file}" >> "${protected}"
          }

          collect_protected_digests "${VERSION}"
          collect_protected_digests "latest" true

          sort -u "${protected}" -o "${protected}"
          echo "Protected digests:"
          sed 's/^/  /' "${protected}"

          PRUNED=0
          NEXT="${IMAGES_BASE}?status=inactive&page_size=100"
          while [[ -n "${NEXT}" && "${NEXT}" != "null" ]]; do
            PAGE_WITH_STATUS="$(
              curl -sS -w '\n%{http_code}' \
                -H "Authorization: Bearer ${HUB_TOKEN}" \
                "${NEXT}"
            )"
            HTTP_STATUS="$(echo "${PAGE_WITH_STATUS}" | tail -n 1)"
            PAGE="$(echo "${PAGE_WITH_STATUS}" | sed '$d')"

            if [[ "${HTTP_STATUS}" == "404" ]]; then
              echo "Inactive images API returned 404; feature unavailable or no inactive image objects. Skipping prune."
              break
            fi
            if [[ "${HTTP_STATUS}" != "200" ]]; then
              echo "Inactive images API returned HTTP ${HTTP_STATUS}; cannot verify stale image cleanup." >&2
              exit 1
            fi

            COUNT="$(echo "${PAGE}" | jq -r '.count // 0')"
            echo "Inactive (untagged) image objects found: ${COUNT}"

            while read -r DIGEST; do
              [[ -n "${DIGEST}" ]] || continue

              if grep -qxF "${DIGEST}" "${protected}"; then
                echo "Keeping currently published digest: ${DIGEST}"
                continue
              fi

              STATUS="$(
                curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
                  -H "Authorization: Bearer ${HUB_TOKEN}" \
                  "${IMAGES_BASE}/${DIGEST}/"
              )"
              if [[ "${STATUS}" == "200" || "${STATUS}" == "202" || "${STATUS}" == "204" ]]; then
                echo "Pruned stale inactive image object: ${DIGEST}"
                PRUNED=$((PRUNED + 1))
              elif [[ "${STATUS}" == "404" ]]; then
                echo "Already gone: ${DIGEST}"
              else
                echo "Unexpected HTTP ${STATUS} pruning ${DIGEST}" >&2
                exit 1
              fi
            done < <(echo "${PAGE}" | jq -r '.results[].digest // empty')

            NEXT=$(echo "${PAGE}" | jq -r '.next // empty')
          done

          echo "Pruned ${PRUNED} stale inactive image object(s)."

  create-release:
    name: Create GitHub Release
    needs: [build-amd64, build-arm64, create-manifest]
    if: always() && needs.build-amd64.result == 'success' && needs.build-arm64.result == 'success' && needs.create-manifest.result == 'success' && github.event.inputs.push != 'false'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Create or update GitHub Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ needs.build-amd64.outputs.version }}
          PROMOTE_LATEST: ${{ needs.create-manifest.outputs.promote_latest }}
          TRIVY_AMD64: ${{ needs.build-amd64.outputs.trivy_summary }}
          TRIVY_ARM64: ${{ needs.build-arm64.outputs.trivy_summary }}
        with:
          # Prefer a dedicated PAT/fine-grained token when available. Creating
          # or moving release tags for commits that modify workflow files can
          # require workflows:write in addition to contents:write, which the
          # default GITHUB_TOKEN does not reliably provide.
          github-token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          script: |
            const version = process.env.VERSION;
            const tagName = 'v' + version;
            const sha = context.sha;
            const promoteLatest = process.env.PROMOTE_LATEST === 'true';
            const trivyAmd64 = process.env.TRIVY_AMD64 || 'Scan not available';
            const trivyArm64 = process.env.TRIVY_ARM64 || 'Scan not available';

            if (!version) {
              throw new Error('VERSION is empty - cannot create release');
            }
            const imageName = 'giiibates/unifi-os-server';
            const releaseName = 'UniFi OS Server ' + version;
            const runId = context.runId;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const downloadApiUrl = 'https://download.svc.ui.com/v1/downloads/products/slugs/unifi-os-server';
            const defaultReleaseNotesUrl = `https://community.ui.com/releases/r/uosserver/${version}`;
            const externalTimeoutMs = 15000;

            function rethrowWithReleasePermissionHint(error) {
              if (error && error.status === 403) {
                throw new Error(
                  'GitHub release mutation was denied (403 Resource not accessible by integration). ' +
                  'Configure repository secret RELEASE_TOKEN with contents:write and workflows:write ' +
                  '(or classic repo + workflow scope). The default GITHUB_TOKEN is not sufficient ' +
                  'for all release/tag update paths, especially when tagging commits that modify workflow files.'
                );
              }
              throw error;
            }

            function stripHtml(html = '') {
              return String(html)
                .replace(/<br\s*\/?\s*>/gi, '\n')
                .replace(/<\/p>/gi, '\n\n')
                .replace(/<\/li>/gi, '\n')
                .replace(/<li[^>]*>/gi, '- ')
                .replace(/<[^>]+>/g, '')
                .replace(/&nbsp;/gi, ' ')
                // Decode named/numeric entities with &amp; last so that a
                // double-encoded sequence like &amp;lt; → &lt; → < is not
                // produced. Decoding &amp; first would cause exactly that.
                .replace(/&lt;/gi, '<')
                .replace(/&gt;/gi, '>')
                .replace(/&#39;/gi, "'")
                .replace(/&quot;/gi, '"')
                .replace(/&amp;/gi, '&')
                .replace(/[ \t]+\n/g, '\n')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
            }

            function hasMeaningfulHtml(html = '') {
              // Strip HTML and normalize all whitespace (including &nbsp; → regular space)
              const text = stripHtml(html).replace(/\s+/g, ' ').trim();
              // Must have actual content (not just whitespace or empty)
              return text.length > 0;
            }

            function renderTextSection(title, blocks) {
              const meaningful = (Array.isArray(blocks) ? blocks : [])
                .map((entry) => entry && entry.__typename === 'TextContent' ? stripHtml(entry.content) : '')
                .filter((text) => text.replace(/\s+/g, ' ').trim().length > 0);

              if (!meaningful.length) {
                return [];
              }

              return [
                `### ${title}`,
                '',
                ...meaningful,
                ''
              ];
            }

            async function fetchJson(url, options = {}, contextLabel = 'request') {
              const fetchOptions = { ...options };
              if (!fetchOptions.signal && typeof AbortSignal !== 'undefined' && typeof AbortSignal.timeout === 'function') {
                fetchOptions.signal = AbortSignal.timeout(externalTimeoutMs);
              }

              const response = await fetch(url, fetchOptions);
              if (!response.ok) {
                throw new Error(`${contextLabel} failed with ${response.status} ${response.statusText}`);
              }

              const payload = await response.json();
              if (payload && Array.isArray(payload.errors) && payload.errors.length > 0) {
                const messages = payload.errors.map((e) => e.message).filter(Boolean).join('; ');
                throw new Error(`${contextLabel} returned GraphQL errors: ${messages || 'unknown error'}`);
              }

              return payload;
            }

            async function resolveOfficialReleaseNotes(targetVersion) {
              let releaseNotesUrl = defaultReleaseNotesUrl;
              let identifier = 'uosserver';

              const downloadsPayload = await fetchJson(downloadApiUrl, {}, 'download metadata request');
              const downloads = Array.isArray(downloadsPayload.downloads) ? downloadsPayload.downloads : [];
              const versionDownloads = downloads.filter((item) => item && item.version === targetVersion);

              const preferred =
                versionDownloads.find((item) => /Linux.*x64/i.test(item.name || '')) ||
                versionDownloads.find((item) => /Linux.*arm64/i.test(item.name || '')) ||
                versionDownloads[0] ||
                null;

              if (preferred && preferred.release_notes_url) {
                releaseNotesUrl = preferred.release_notes_url;
              }

              const slugMatch = String(releaseNotesUrl).match(/\/releases\/r\/([^/]+)\/[0-9]+(?:\.[0-9]+){2,3}$/i);
              if (slugMatch && slugMatch[1]) {
                identifier = slugMatch[1];
              }

              const redirectQuery = [
                'query GetReleaseIdForRedirect($version: String!, $identifier: String!) {',
                '  releaseIdForRedirect(version: $version, identifier: $identifier)',
                '}'
              ].join('\n');

              const redirectPayload = await fetchJson(
                'https://community.svc.ui.com/graphql',
                {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({
                    operationName: 'GetReleaseIdForRedirect',
                    query: redirectQuery,
                    variables: { version: targetVersion, identifier }
                  })
                },
                'release id lookup'
              );

              const releaseId = redirectPayload?.data?.releaseIdForRedirect;
              if (!releaseId) {
                throw new Error(`No release ID found for ${identifier}/${targetVersion}`);
              }

              const releaseQuery = [
                'query GetReleaseForAutomation($id: ID!) {',
                '  release(id: $id) {',
                '    title',
                '    version',
                '    content { __typename ... on TextContent { content } }',
                '    newFeatures { __typename ... on TextContent { content } }',
                '    improvements { __typename ... on TextContent { content } }',
                '    bugfixes { __typename ... on TextContent { content } }',
                '    knownIssues { __typename ... on TextContent { content } }',
                '    importantNotes { __typename ... on TextContent { content } }',
                '    instructions { __typename ... on TextContent { content } }',
                '    rollingReleaseNotes { __typename ... on TextContent { content } }',
                '  }',
                '}'
              ].join('\n');

              const releasePayload = await fetchJson(
                'https://community.svc.ui.com/graphql',
                {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({
                    operationName: 'GetReleaseForAutomation',
                    query: releaseQuery,
                    variables: { id: releaseId }
                  })
                },
                'release details lookup'
              );

              return {
                releaseNotesUrl,
                release: releasePayload?.data?.release || null
              };
            }

            let releaseNotesLines = [];
            try {
              const { releaseNotesUrl, release } = await resolveOfficialReleaseNotes(version);
              const structuredSections = [
                ...renderTextSection('Overview', release?.content),
                ...renderTextSection('New Features', release?.newFeatures),
                ...renderTextSection('Improvements', release?.improvements),
                ...renderTextSection('Bugfixes', release?.bugfixes),
                ...renderTextSection('Known Issues', release?.knownIssues),
                ...renderTextSection('Important Notes', release?.importantNotes),
                ...renderTextSection('Instructions', release?.instructions),
                ...renderTextSection('Rolling Release Notes', release?.rollingReleaseNotes)
              ];

              if (structuredSections.length > 0) {
                releaseNotesLines = [
                  '## Official UniFi Release Notes',
                  '',
                  ...structuredSections,
                  `Source: ${releaseNotesUrl}`,
                  ''
                ];
              } else {
                releaseNotesLines = [
                  '## Official UniFi Release Notes',
                  '',
                  `No structured note content found. Source: ${releaseNotesUrl}`,
                  ''
                ];
              }
            } catch (e) {
              console.warn(`Release notes fetch failed for ${version}: ${e.message}`);
              releaseNotesLines = [
                '## Official UniFi Release Notes',
                '',
                `Automatic release-note extraction failed. Source: ${defaultReleaseNotesUrl}`,
                ''
              ];
            }

            const findingsLinks = {
              amd64: `${runUrl}#artifacts`,
              arm64: `${runUrl}#artifacts`
            };
            const availableTags = [
              '- `' + imageName + ':' + version + '` (multi-arch: linux/amd64, linux/arm64)'
            ];
            if (promoteLatest) {
              availableTags.push('- `' + imageName + ':latest`');
            }

            const body = [
              '## UniFi OS Server ' + version,
              '',
              '**Docker Image:** `docker pull ' + imageName + ':' + version + '`',
              '',
              '### Available Tags',
              ...availableTags,
              '',
              '> Architecture-specific tags (`-amd64`, `-arm64`) are removed from Docker Hub after the multi-arch manifest is published.',
              '',
              '### Security Scan Results',
              '',
              '| Architecture | Status | Findings |',
              '|--------------|--------|----------|',
              '| amd64 | ' + trivyAmd64 + ' | [trivy-findings-amd64](' + findingsLinks.amd64 + ') |',
              '| arm64 | ' + trivyArm64 + ' | [trivy-findings-arm64](' + findingsLinks.arm64 + ') |',
              '| run | workflow details | [Actions Run](' + runUrl + ') |',
              '',
              '> Scanned with [Trivy](https://trivy.dev/) for HIGH and CRITICAL severity vulnerabilities (unfixed CVEs ignored).',
              '',
              ...releaseNotesLines,
              '**Source:** [Ubiquiti Downloads](https://ui.com/download/software/unifi-os-server)'
            ].join('\n');

            // --- Idempotency: move the release tag before upserting the release ---
            async function upsertTag() {
              const ref = `tags/${tagName}`;
              let existingRef;
              try {
                const { data } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref
                });
                existingRef = data;
              } catch (e) {
                if (e.status === 404) {
                  // Tag does not exist → create it
                  await github.rest.git.createRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `refs/tags/${tagName}`,
                    sha
                  });
                  console.log(`Created tag ${tagName} -> ${sha}`);
                  return;
                }
                throw e;
              }

              // Tag exists — check if it already points to the current commit
              if (existingRef.object.sha === sha) {
                console.log(`Tag ${tagName} already at ${sha} (no update needed)`);
                return;
              }

              // Tag points to a different commit → try to move it.
              // This will fail with 403 if tag protection rules/rulesets block it.
              console.log(`Tag ${tagName} at ${existingRef.object.sha}, moving to ${sha}...`);
              try {
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tagName}`,
                  sha,
                  force: true
                });
                console.log(`Moved tag ${tagName} -> ${sha}`);
              } catch (e) {
                if (e.status === 403 || e.status === 422) {
                  throw new Error(
                    `Cannot move tag ${tagName}: ${e.message}. ` +
                    'Idempotent replacement requires the release tag to point at the current workflow commit. ' +
                    'Remove the tag protection rule for v* tags or use RELEASE_TOKEN with permission to update release tags.'
                  );
                } else {
                  throw e;
                }
              }
            }

            try {
              await upsertTag();
            } catch (error) {
              rethrowWithReleasePermissionHint(error);
            }

            async function findMatchingReleases() {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              return releases
                .filter((release) => release && (release.tag_name === tagName || release.name === releaseName))
                .sort((left, right) => new Date(left.created_at) - new Date(right.created_at));
            }

            function pickCanonicalRelease(releases) {
              if (!Array.isArray(releases) || releases.length === 0) {
                return null;
              }

              return (
                releases.find((release) => release.tag_name === tagName && !release.draft) ||
                releases.find((release) => release.tag_name === tagName) ||
                releases.find((release) => release.name === releaseName && !release.draft) ||
                releases[0]
              );
            }

            async function deleteDuplicateReleases(primaryRelease, releases) {
              for (const release of releases) {
                if (!release || release.id === primaryRelease.id) {
                  continue;
                }
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
                console.log(`Deleted duplicate release ${release.id} (${release.tag_name || 'no-tag'})`);
              }
            }

            async function upsertRelease() {
              const matchingReleases = await findMatchingReleases();
              const existingRelease = pickCanonicalRelease(matchingReleases);

              if (existingRelease) {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existingRelease.id,
                  tag_name: tagName,
                  name: releaseName,
                  body: body,
                  draft: false,
                  prerelease: false,
                  make_latest: promoteLatest ? 'true' : 'false'
                });
                console.log(`Updated release ${existingRelease.id} for ${tagName}`);
                await deleteDuplicateReleases(existingRelease, matchingReleases);
                return;
              }

              try {
                const { data: createdRelease } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  target_commitish: sha,
                  name: releaseName,
                  body: body,
                  draft: false,
                  prerelease: false,
                  make_latest: promoteLatest ? 'true' : 'false'
                });
                console.log(`Created release ${createdRelease.id} for ${tagName}`);
              } catch (e) {
                if (e.status !== 422) {
                  throw e;
                }

                const retryMatches = await findMatchingReleases();
                const retryRelease = pickCanonicalRelease(retryMatches);
                if (!retryRelease) {
                  throw e;
                }

                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: retryRelease.id,
                  tag_name: tagName,
                  name: releaseName,
                  body: body,
                  draft: false,
                  prerelease: false,
                  make_latest: promoteLatest ? 'true' : 'false'
                });
                console.log(`Updated release ${retryRelease.id} for ${tagName} after 422 retry`);
                await deleteDuplicateReleases(retryRelease, retryMatches);
              }
            }

            try {
              await upsertRelease();
            } catch (error) {
              rethrowWithReleasePermissionHint(error);
            }
