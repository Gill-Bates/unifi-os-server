name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'linux/amd64,linux/arm64'

env:
  REGISTRY: docker.io
  IMAGE_NAME: giiibates/unifi-os-server

# Prevent duplicate builds - queue new runs, don't cancel in-progress builds
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64 image (auto-fetch URLs)
        id: build
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PUSH: 'false'
          PLATFORMS: linux/amd64
        run: |
          bash ./docker/build.sh
          # Extract version from built image
          VERSION=$(docker images --format '{{.Tag}}' "$IMAGE_NAME" | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "latest")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Built version: ${VERSION}"

      - name: Trivy vulnerability scan (amd64)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.build.outputs.version }}-amd64'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
          trivyignores: '.trivyignore'

      - name: Push amd64 image
        if: github.event.inputs.push != 'false'
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          docker push "${IMAGE_NAME}:${VERSION}-amd64"

  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-24.04-arm  # Native arm64 runner - no QEMU emulation needed
    if: github.event.inputs.platforms == 'linux/arm64' || github.event.inputs.platforms == 'linux/amd64,linux/arm64' || github.event.inputs.platforms == ''
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # No QEMU needed - running natively on arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push != 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build arm64 image (auto-fetch URLs)
        id: build
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PUSH: 'false'
          PLATFORMS: linux/arm64
        run: |
          bash ./docker/build.sh
          VERSION=$(docker images --format '{{.Tag}}' "$IMAGE_NAME" | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "latest")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Trivy vulnerability scan (arm64)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.build.outputs.version }}-arm64'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
          trivyignores: '.trivyignore'

      - name: Push arm64 image
        if: github.event.inputs.push != 'false'
        run: |
          VERSION="${{ steps.build.outputs.version }}"
          docker push "${IMAGE_NAME}:${VERSION}-arm64"

  create-manifest:
    name: Create multi-arch manifest
    needs: [build-amd64, build-arm64]
    if: always() && needs.build-amd64.result == 'success' && github.event.inputs.push != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION="${{ needs.build-amd64.outputs.version }}"
          
          # Check which images are available
          IMAGES=""
          if docker manifest inspect "${IMAGE_NAME}:${VERSION}-amd64" > /dev/null 2>&1; then
            IMAGES="${IMAGE_NAME}:${VERSION}-amd64"
          fi
          if docker manifest inspect "${IMAGE_NAME}:${VERSION}-arm64" > /dev/null 2>&1; then
            IMAGES="${IMAGES} ${IMAGE_NAME}:${VERSION}-arm64"
          fi
          
          if [[ -z "$IMAGES" ]]; then
            echo "No images available for manifest"
            exit 1
          fi
          
          echo "Creating manifest with: $IMAGES"
          
          # Create version manifest
          docker manifest create "${IMAGE_NAME}:${VERSION}" $IMAGES --amend
          docker manifest push "${IMAGE_NAME}:${VERSION}"
          
          # Create latest manifest
          docker manifest create "${IMAGE_NAME}:latest" $IMAGES --amend
          docker manifest push "${IMAGE_NAME}:latest"
          
          echo "Pushed manifests:"
          echo "  ${IMAGE_NAME}:${VERSION}"
          echo "  ${IMAGE_NAME}:latest"

  create-release:
    name: Create GitHub Release
    needs: [build-amd64, create-manifest]
    if: needs.create-manifest.result == 'success' && github.event.inputs.push != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.build-amd64.outputs.version }}';
            
            const body = [
              '## UniFi OS Server ' + version,
              '',
              '**Docker Image:** `docker pull giiibates/unifi-os-server:' + version + '`',
              '',
              '### Available Tags',
              '- `giiibates/unifi-os-server:' + version + '` (multi-arch)',
              '- `giiibates/unifi-os-server:' + version + '-amd64`',
              '- `giiibates/unifi-os-server:' + version + '-arm64`',
              '- `giiibates/unifi-os-server:latest`',
              '',
              '**Source:** [Ubiquiti Downloads](https://ui.com/download/software/unifi-os-server)'
            ].join('\n');
            
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'v' + version,
                name: 'UniFi OS Server ' + version,
                body: body,
                draft: false,
                prerelease: false
              });
              console.log('Created release v' + version);
            } catch (e) {
              if (e.status === 422) {
                console.log('Release v' + version + ' already exists, updating...');
                // Get existing release and update it
                const { data: release } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: 'v' + version
                });
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  body: body
                });
                console.log('Updated release v' + version);
              } else {
                throw e;
              }
            }
