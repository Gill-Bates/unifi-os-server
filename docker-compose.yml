services:
  unifi-os-server:
    image: giiibates/unifi-os-server:latest
    container_name: unifi-os-server
    hostname: unifi-os-server
    privileged: true
    cgroup: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
    environment:
      - UOS_SYSTEM_IP=${UOS_SYSTEM_IP:-unifi.example.com}
      - HARDWARE_PLATFORM=${HARDWARE_PLATFORM:-}
      - UOS_INSTALL_ON_BOOT=0
      - UOS_FORCE_INSTALL=0
      - UOS_NETWORK_MODE=pasta
      - UOS_WEB_PORT=8443
      - UOS_UID=1000
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./uos-data/home:/home/uosserver
      - ./uos-data:/var/lib/uosserver
      - ./uos-config:/etc/uosserver
      - ./uos-logs:/var/log/uosserver
      - ./uos-containers:/var/lib/containers/storage
      - ./uos-unifi:/var/lib/unifi
      - ./uos-mongodb:/var/lib/mongodb
    ports:
      - "11443:443"
      - "8080:8080"
      - "8443:8443"
      - "3478:3478/udp"
      - "10003:10003/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
