# UniFi OS Server - Docker Compose Configuration

services:
  unifi-os-server:
    image: giiibates/unifi-os-server:latest
    container_name: unifi-os-server
    hostname: unifi-os-server
    privileged: true
    cgroup: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
    environment:
      - UOS_SYSTEM_IP=${UOS_SYSTEM_IP:-unifi.example.com}

      # Hardware platform override (set to "synology" for Synology NAS)
      - HARDWARE_PLATFORM=${HARDWARE_PLATFORM:-}
      - UOS_INSTALL_ON_BOOT=1
      - UOS_FORCE_INSTALL=0
      - UOS_NETWORK_MODE=pasta
      - UOS_WEB_PORT=8443
      - UOS_UID=1000
    # Bind mounts are intentional so the generated UOS state stays visible in
    # this project directory instead of ending up in hidden Docker volumes.
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./uos-home:/home/uosserver
      - ./uos-data:/var/lib/uosserver
      - ./uos-config:/etc/uosserver
      - ./uos-logs:/var/log/uosserver
      - ./uos-containers:/var/lib/containers/storage
      - ./uos-unifi:/var/lib/unifi
      - ./uos-mongodb:/var/lib/mongodb
    ports:
      # UniFi OS Server GUI/API (main web interface)
      - "11443:443"
      # Device and application communication (REQUIRED for device adoption)
      - "8080:8080"
      # UniFi Network Application GUI/API
      - "8443:8443"
      # STUN for device adoption and communication (REQUIRED)
      - "3478:3478/udp"
      # Device discovery during adoption
      - "10003:10003/udp"
      # Optional ports (uncomment as needed):
      # - "5005:5005"      # RTP control protocol
      # - "9543:9543"      # UniFi Identity Hub
      # - "6789:6789"      # UniFi mobile speed test
      # - "8444:8444"      # Secure Portal for Hotspot
      # - "5514:5514/udp"  # Remote syslog capture
      # - "11084:11084"    # UniFi Site Supervisor
      # - "5671:5671"      # AQMPS
      # - "8880:8880"      # Hotspot portal redirection (HTTP)
      # - "8881:8881"      # Hotspot portal redirection (HTTP)
      # - "8882:8882"      # Hotspot portal redirection (HTTP)
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s